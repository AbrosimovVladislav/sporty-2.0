<!DOCTYPE html>
<html lang="ru"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>События — Sporty</title>
<link rel="stylesheet" href="colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font-sans); background: var(--bg-secondary); display: flex; align-items: flex-start; justify-content: center; min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel">

const EVENTS = [
  { day: '05', month: 'МАЯ', weekday: 'ПН', time: '15:40', team: 'ХК Волки', type: 'Тренировка', venue: 'Pole.kz', address: 'Бостандыкский р-н, ул. Жарокова 200', myTeam: true, people: 1, money: 1000 },
  { day: '11', month: 'МАЯ', weekday: 'ВС', time: '19:00', team: 'Алатау United', type: 'Игра', venue: 'Pole.kz', address: 'Бостандыкский р-н, ул. Жарокова 200', myTeam: false, people: 11, money: 5000 },
  { day: '11', month: 'МАЯ', weekday: 'ВС', time: '19:00', team: 'Тулпар FC', type: 'Игра', venue: 'Стадион Спартак', address: 'Медеуский р-н, ул. Абая 48', myTeam: false, people: 11, money: 5000 },
  { day: '11', month: 'МАЯ', weekday: 'ВС', time: '19:00', team: 'Snow Leopards', type: 'Игра', venue: 'Футбольное поле на Байту…', address: 'Байтурсынова 5а', myTeam: false, people: 11, money: 5000 },
  { day: '14', month: 'МАЯ', weekday: 'СР', time: '18:00', team: 'ХК Волки', type: 'Сбор', venue: 'Парк Горького', address: 'Гоголя 1', myTeam: true, people: 8, money: 0 },
  { day: '18', month: 'МАЯ', weekday: 'ВС', time: '10:00', team: 'Барсы', type: 'Тренировка', venue: 'Pole.kz', address: 'Бостандыкский р-н, ул. Жарокова 200', myTeam: false, people: 6, money: 2000 },
  { day: '20', month: 'МАЯ', weekday: 'ВТ', time: '20:00', team: 'Алатау United', type: 'Игра', venue: 'Pole.kz', address: 'Бостандыкский р-н, ул. Жарокова 200', myTeam: false, people: 11, money: 5000 },
];

const TYPE_STYLES = {
  'Игра':        { bg: 'var(--green-100)', color: 'var(--green-700)', border: 'var(--green-200)' },
  'Тренировка':  { bg: 'oklch(0.95 0.03 240)', color: 'oklch(0.45 0.14 240)', border: 'oklch(0.88 0.06 240)' },
  'Сбор':        { bg: 'oklch(0.95 0.03 75)', color: 'oklch(0.52 0.14 75)', border: 'oklch(0.88 0.08 75)' },
  'Другое':      { bg: 'var(--gray-100)', color: 'var(--gray-600)', border: 'var(--gray-200)' },
};

function SearchIcon() {
  return <svg width="20" height="20" fill="none" stroke="var(--text-tertiary)" strokeWidth="2" strokeLinecap="round"><circle cx="9" cy="9" r="6"/><line x1="13.5" y1="13.5" x2="18" y2="18"/></svg>;
}
function FilterIcon() {
  return <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M2.5 3h15l-5.625 6.65v4.6L8.125 16V9.65L2.5 3z" stroke="var(--text-secondary)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>;
}
function CheckIcon() {
  return <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7.5L5.5 10L11 4" stroke="var(--green-600)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>;
}
function PeopleIcon() {
  return <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>;
}

function EventCard({ event }) {
  const e = event;
  const ts = TYPE_STYLES[e.type] || TYPE_STYLES['Другое'];

  return (
    <div style={{
      display: 'flex', gap: 12, padding: '14px 16px',
      borderBottom: '1px solid var(--gray-100)',
    }}>
      {/* Left: Date+Time calendar */}
      <div style={{
        flexShrink: 0, width: 72, display: 'flex', flexDirection: 'column',
        alignItems: 'center', borderRadius: 14, overflow: 'hidden',
        background: 'var(--bg-card)', border: '1.5px solid var(--border)',
      }}>
        <div style={{
          width: '100%', padding: '5px 0 3px', textAlign: 'center',
          background: 'var(--green-600)', color: '#fff',
          fontFamily: 'var(--font-display)', fontSize: 10, fontWeight: 600,
          letterSpacing: '0.08em', textTransform: 'uppercase',
        }}>{e.weekday}</div>
        <div style={{
          padding: '5px 0 0', textAlign: 'center',
          fontFamily: 'var(--font-display)', fontSize: 28, fontWeight: 700,
          color: 'var(--text-primary)', lineHeight: 1,
        }}>{e.day}</div>
        <div style={{
          padding: '1px 0 4px', textAlign: 'center',
          fontSize: 9, fontWeight: 700, color: 'var(--text-tertiary)',
          letterSpacing: '0.06em', textTransform: 'uppercase',
        }}>{e.month}</div>
        <div style={{
          width: '100%', padding: '4px 0 6px', textAlign: 'center',
          borderTop: '1px solid var(--border)',
          fontFamily: 'var(--font-display)', fontSize: 15, fontWeight: 600,
          color: 'var(--green-700)', letterSpacing: '0.02em',
        }}>{e.time}</div>
      </div>

      {/* Center: content column */}
      <div style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column', gap: 3, alignSelf: 'stretch' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <span style={{
            display: 'inline-flex', padding: '3px 8px', borderRadius: 8,
            fontSize: 11, fontWeight: 700, letterSpacing: '0.02em',
            background: ts.bg, color: ts.color, border: `1px solid ${ts.border}`,
          }}>{e.type}</span>
          {e.myTeam && (
            <span style={{
              display: 'inline-flex', padding: '2px 7px', borderRadius: 8,
              fontSize: 10, fontWeight: 700, flexShrink: 0,
              background: 'var(--green-50)', color: 'var(--green-700)',
              border: '1px solid var(--green-200)',
            }}>Моя команда</span>
          )}
        </div>
        <div style={{ fontSize: 16, fontWeight: 600, color: 'var(--text-primary)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{e.team}</div>
        <div style={{ flex: 1 }}></div>
        <div style={{ fontSize: 13, color: 'var(--text-secondary)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{e.venue}</div>
        {e.address && <div style={{ fontSize: 12, color: 'var(--text-tertiary)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{e.address}</div>}
      </div>

      {/* Right: people top, price bottom */}
      <div style={{
        flexShrink: 0, width: 70, display: 'flex', flexDirection: 'column',
        alignItems: 'flex-end', justifyContent: 'space-between', alignSelf: 'stretch',
      }}>
        <span style={{ display: 'inline-flex', alignItems: 'center', gap: 3, fontSize: 14, fontWeight: 600, color: 'var(--green-600)' }}><PeopleIcon/> {e.people}</span>
        {e.money > 0 ? (
          <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--text-secondary)', fontVariantNumeric: 'tabular-nums' }}>{e.money.toLocaleString('ru-RU')} ₸</span>
        ) : <span></span>}
      </div>
    </div>
  );
}

function EventsPage() {
  const [activeType, setActiveType] = React.useState('all');
  const types = [
    { id: 'all', label: 'Все' },
    { id: 'Игра', label: 'Игра' },
    { id: 'Тренировка', label: 'Трен.' },
    { id: 'Сбор', label: 'Сбор' },
    { id: 'Другое', label: 'Другое' },
  ];
  const filtered = activeType === 'all' ? EVENTS : EVENTS.filter(e => e.type === activeType);

  return (
    <div style={{ background: 'var(--bg-primary)', minHeight: '100%', display: 'flex', flexDirection: 'column' }}>
      {/* Green header */}
      <div style={{ background: 'var(--green-600)', padding: '16px 16px 20px', borderRadius: '0 0 24px 24px', position: 'relative', overflow: 'hidden' }}>
        <div style={{ position: 'absolute', inset: 0, opacity: 0.08, backgroundImage: 'repeating-linear-gradient(135deg, transparent, transparent 10px, rgba(255,255,255,0.3) 10px, rgba(255,255,255,0.3) 12px)' }}></div>
        <div style={{ position: 'relative', zIndex: 1, fontFamily: 'var(--font-display)', fontSize: 28, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.02em', color: '#fff' }}>СОБЫТИЯ</div>
      </div>

      {/* Tabs */}
      <div style={{ display: 'flex', borderBottom: '1px solid var(--gray-100)' }}>
        {['События', 'Команды', 'Игроки', 'Площадки'].map((tab, i) => (
          <div key={tab} style={{ flex: 1, textAlign: 'center', padding: '12px 0', fontSize: 14, fontWeight: i===0?700:500, color: i===0?'var(--green-700)':'var(--text-secondary)', borderBottom: i===0?'2.5px solid var(--green-700)':'none', cursor: 'pointer' }}>{tab}</div>
        ))}
      </div>

      {/* Search */}
      <div style={{ padding: '12px 16px 0', display: 'flex', gap: 8, alignItems: 'center' }}>
        <div style={{ flex: 1, position: 'relative' }}>
          <div style={{ position: 'absolute', left: 14, top: '50%', transform: 'translateY(-50%)' }}><SearchIcon/></div>
          <input type="text" placeholder="Команда, площадка…" style={{ width: '100%', padding: '12px 12px 12px 40px', borderRadius: 14, border: '1.5px solid var(--border)', background: 'var(--bg-card)', fontSize: 15, fontFamily: 'inherit', color: 'var(--text-primary)', outline: 'none' }} />
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 2, padding: '12px 14px', borderRadius: 14, background: 'var(--bg-card)', border: '1.5px solid var(--border)', fontSize: 14, fontWeight: 600, whiteSpace: 'nowrap', cursor: 'pointer', height: 46 }}>
          Алматы <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style={{marginLeft:2}}><path d="M3 4.5L6 7.5L9 4.5" stroke="var(--text-secondary)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </div>
        <div style={{ width: 46, height: 46, borderRadius: 14, background: 'var(--bg-card)', border: '1.5px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, cursor: 'pointer' }}>
          <FilterIcon/>
        </div>
      </div>

      {/* Type pills */}
      <div style={{ padding: '12px 16px 0', display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 6 }}>
        {types.map(t => (
          <div key={t.id} onClick={() => setActiveType(t.id)} style={{ borderRadius: 10, padding: '8px 4px', fontSize: 12, fontWeight: 600, textAlign: 'center', cursor: 'pointer', background: activeType===t.id?'var(--gray-900)':'var(--bg-card)', color: activeType===t.id?'#fff':'var(--text-secondary)', border: activeType===t.id?'1px solid var(--gray-900)':'1px solid var(--border)' }}>{t.label}</div>
        ))}
      </div>

      {/* Meta */}
      <div style={{ padding: '12px 16px 0', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <span style={{ fontSize: 13, color: 'var(--text-tertiary)' }}>РЕЗУЛЬТАТЫ · {filtered.length}</span>
        <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--text-accent)', background: 'var(--bg-card)', border: '1px solid var(--border)', borderRadius: 9999, padding: '4px 12px', cursor: 'pointer' }}>Сначала ближайшие ▾</span>
      </div>

      {/* Event list */}
      <div style={{ marginTop: 8 }}>
        {filtered.map((e, i) => <EventCard key={i} event={e} />)}
      </div>
    </div>
  );
}

function App() {
  return <EventsPage/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body></html>
