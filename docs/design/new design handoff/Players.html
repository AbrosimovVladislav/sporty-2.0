<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>SportyX — Игроки</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green-900:#0e4a35;
    --green-800:#125a3f;
    --green-700:#15694a;
    --green-600:#1a7a55;
    --green-500:#1f8a60;
    --ink-900:#0c1411;
    --ink-700:#2b3733;
    --ink-500:#5c6a65;
    --ink-400:#8a9994;
    --ink-300:#b8c2bd;
    --ink-200:#dde3df;
    --ink-100:#eef2ef;
    --bg:#f6f7f5;
    --card:#ffffff;

    --pos-fwd-bg:#fde8ea;
    --pos-fwd-fg:#c93545;
    --pos-mid-bg:#fff4dd;
    --pos-mid-fg:#c48a14;
    --pos-def-bg:#e2f3e8;
    --pos-def-fg:#1a7a45;
    --pos-gk-bg:#e0effd;
    --pos-gk-fg:#2a6ec2;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#0a0d0c;font-family:'Geist',system-ui,sans-serif;color:var(--ink-900);-webkit-font-smoothing:antialiased}
  .font-display{font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.01em}
  .font-sans{font-family:'Geist',system-ui,sans-serif}

  /* App body inside the iOS frame */
  .app{
    width:100%;
    min-height:100%;
    background:var(--bg);
    display:flex;
    flex-direction:column;
    font-size:14px;
  }
  .status-spacer{height:54px;background:var(--green-700);flex-shrink:0}
  .home-spacer{height:34px;background:#fff;flex-shrink:0}

  /* ---- Header (green, rounded) ---- */
  .header{
    background:var(--green-700);
    color:#fff;
    padding:8px 20px 20px;
    position:relative;
    border-radius:0 0 18px 18px;
    overflow:hidden;
    z-index:1;
  }
  .header::before{
    content:"";
    position:absolute;inset:0;
    background:repeating-linear-gradient(
      -55deg,
      transparent,
      transparent 14px,
      rgba(255,255,255,.06) 14px,
      rgba(255,255,255,.06) 16px
    );
    pointer-events:none;
  }
  .header h1{
    margin:6px 0 0 0;
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:30px;
    letter-spacing:.04em;
    text-transform:uppercase;
    line-height:1;
  }
  .header-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .header-actions{display:flex;gap:10px;align-items:center}
  .icon-btn{
    width:34px;height:34px;border-radius:10px;
    background:rgba(255,255,255,.12);
    display:grid;place-items:center;color:#fff;
    border:1px solid rgba(255,255,255,.08);
  }

  /* ---- Tabs ---- */
  .tabs{
    display:flex;
    background:#fff;
    padding:0 12px;
    border-bottom:1px solid var(--ink-100);
  }
  .tab{
    flex:1;
    text-align:center;
    padding:14px 6px 12px;
    font-size:14px;
    color:var(--ink-500);
    font-weight:500;
    position:relative;
    cursor:pointer;
    user-select:none;
  }
  .tab.active{color:var(--ink-900);font-weight:600}
  .tab.active::after{
    content:"";
    position:absolute;
    left:50%;transform:translateX(-50%);
    bottom:-1px;
    width:36px;height:2.5px;
    background:var(--green-700);
    border-radius:2px;
  }

  /* ---- Search row ---- */
  .search-row{
    display:flex;gap:8px;
    padding:14px 16px 8px;
    background:#fff;
  }
  .search{
    flex:1;
    height:42px;
    background:var(--bg);
    border:1px solid var(--ink-100);
    border-radius:12px;
    display:flex;align-items:center;gap:8px;
    padding:0 12px;
    color:var(--ink-400);
    font-size:14px;
  }
  .chip{
    height:42px;
    background:#fff;
    border:1px solid var(--ink-200);
    border-radius:12px;
    display:flex;align-items:center;gap:6px;
    padding:0 12px;
    font-size:14px;
    color:var(--ink-900);
    font-weight:500;
    white-space:nowrap;
  }
  .chip svg{flex-shrink:0}
  .filter-btn{
    width:42px;height:42px;border-radius:12px;
    background:#fff;border:1px solid var(--ink-200);
    display:grid;place-items:center;
  }

  /* ---- Result meta ---- */
  .result-meta{
    display:flex;justify-content:space-between;align-items:center;
    padding:14px 16px 10px;
    background:#fff;
  }
  .result-meta .count{font-size:13px;color:var(--ink-500)}
  .result-meta .count b{color:var(--ink-900);font-weight:600}
  .sort-pill{
    height:32px;border-radius:999px;
    background:#eaf3ee;
    color:var(--green-800);
    font-weight:600;font-size:13px;
    padding:0 12px;
    display:flex;align-items:center;gap:6px;
  }

  /* ---- List ---- */
  .list{
    flex:1;
    overflow-y:auto;
    background:#fff;
    padding-bottom:8px;
  }
  .row{
    display:flex;align-items:center;gap:14px;
    padding:12px 16px;
    border-bottom:1px solid var(--ink-100);
  }
  .row:last-child{border-bottom:none}
  .avatar-wrap{
    position:relative;width:54px;height:54px;flex-shrink:0;
  }
  .avatar{
    width:54px;height:54px;border-radius:50%;
    background-size:cover;background-position:center 20%;
    background-color:var(--ink-100);
  }
  .team-badge{
    position:absolute;right:-2px;bottom:-2px;
    width:22px;height:22px;border-radius:50%;
    background:#0c1411;color:#fff;
    border:2px solid #fff;
    display:grid;place-items:center;
    font-size:9px;font-weight:700;
    letter-spacing:.02em;
  }
  .row-main{flex:1;min-width:0}
  .row-name{
    font-size:16px;font-weight:600;color:var(--ink-900);
    line-height:1.2;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .pos-tag{
    margin-top:6px;
    display:inline-flex;align-items:center;gap:5px;
    height:22px;padding:0 8px;
    border-radius:6px;
    font-size:11px;font-weight:600;
    letter-spacing:.04em;
  }
  .pos-fwd{background:var(--pos-fwd-bg);color:var(--pos-fwd-fg)}
  .pos-mid{background:var(--pos-mid-bg);color:var(--pos-mid-fg)}
  .pos-def{background:var(--pos-def-bg);color:var(--pos-def-fg)}
  .pos-gk {background:var(--pos-gk-bg); color:var(--pos-gk-fg)}

  /* Rating */
  .rating{
    position:relative;
    width:56px;height:56px;
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
  }
  .rating .num{
    font-family:'Oswald',sans-serif;
    font-weight:700;
    font-size:24px;
    line-height:1;
    letter-spacing:-.01em;
    position:relative;
    z-index:1;
  }
  .rating .ring{
    position:absolute;inset:0;width:56px;height:56px;
    pointer-events:none;
  }

  /* ---- Bottom Tab Bar ---- */
  .tabbar{
    display:grid;grid-template-columns:repeat(4,1fr);
    background:#fff;
    border-top:1px solid var(--ink-100);
    padding:8px 8px 6px;
    gap:4px;
  }
  .tabbar-item{
    display:flex;flex-direction:column;align-items:center;gap:3px;
    color:var(--ink-400);font-size:11px;font-weight:500;
    padding:4px 0;
  }
  .tabbar-item.active{color:var(--green-700);font-weight:600}

  /* utility scrollbar hide */
  .list::-webkit-scrollbar{display:none}
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>

<script type="text/babel">
const { IOSDevice } = window;

// ---- icons ----
const Icon = {
  Search: (p) => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
  ),
  Pin: (p) => (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 21s-7-7.5-7-12a7 7 0 1 1 14 0c0 4.5-7 12-7 12Z"/><circle cx="12" cy="9" r="2.5"/></svg>
  ),
  Chevron: (p) => (
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="m6 9 6 6 6-6"/></svg>
  ),
  Filter: (p) => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M3 4h18l-7 8.5V19l-4 2v-8.5L3 4Z"/></svg>
  ),
  Bell: (p) => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M6 8a6 6 0 1 1 12 0c0 4 1.5 5.5 2 6.5H4c.5-1 2-2.5 2-6.5Z"/><path d="M10 18a2 2 0 0 0 4 0"/></svg>
  ),
  Sort: (p) => (
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M3 7h13"/><path d="M3 12h9"/><path d="M3 17h5"/><path d="m17 8 4 4-4 4"/></svg>
  ),
  Home: (p) => (
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M3 12l9-8 9 8"/><path d="M5 10v9a1 1 0 0 0 1 1h3v-5h6v5h3a1 1 0 0 0 1-1v-9"/></svg>
  ),
  Team: (p) => (
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 2 4 6v5c0 5.5 3.8 10.7 9 12 5.2-1.3 9-6.5 9-12V6l-8-4Z"/></svg>
  ),
  SearchTab: (p) => (
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/></svg>
  ),
  Profile: (p) => (
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="8" r="4"/><path d="M5 20a7 7 0 0 1 14 0"/></svg>
  ),
  // position glyphs — boot (16px), crosshair, shield, glove
  PosFwd: () => (
    <span style={{display:'inline-block',width:14,height:14,backgroundColor:'currentColor',WebkitMaskImage:'url(uploads/pasted-1777964657654-0.png)',WebkitMaskSize:'contain',WebkitMaskRepeat:'no-repeat',WebkitMaskPosition:'center',maskImage:'url(uploads/pasted-1777964657654-0.png)',maskSize:'contain',maskRepeat:'no-repeat',maskPosition:'center'}}/>
  ),
  PosMid: (p) => (
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="1" fill="currentColor" stroke="none"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
  ),
  PosDef: (p) => (
    <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" stroke="none" {...p}><path d="M12 2 3 6v5c0 5.5 3.8 10.7 9 12 5.2-1.3 9-6.5 9-12V6l-9-4Zm0 2.2 7 3.1v4.7c0 4.6-3.1 8.8-7 10-3.9-1.2-7-5.4-7-10V7.3l7-3.1Z"/><path d="M12 7 8 9v3c0 2.5 1.7 4.8 4 5.4 2.3-.6 4-2.9 4-5.4V9l-4-2Z"/></svg>
  ),
  PosGk: () => (
    <span style={{display:'inline-block',width:14,height:14,backgroundColor:'currentColor',WebkitMaskImage:'url(uploads/pasted-1777964785667-0.png)',WebkitMaskSize:'contain',WebkitMaskRepeat:'no-repeat',WebkitMaskPosition:'center',maskImage:'url(uploads/pasted-1777964785667-0.png)',maskSize:'contain',maskRepeat:'no-repeat',maskPosition:'center'}}/>
  ),
};

// ---- Avatars (placeholders via Unsplash random portraits) ----
const A = (seed) => `https://images.unsplash.com/photo-${seed}?auto=format&fit=crop&w=200&h=200&q=70`;

const players = [
  { id:1, name:"Илья Петров",     pos:{kind:"fwd",label:"НАП"}, rating:100, club:"FCK", clubColor:"#0c1411",
    avatar:"1535713875002-d1d0cf377fde" },
  { id:2, name:"Антон Петров",    pos:{kind:"mid",label:"ПЗЩ"}, rating:97,  club:"FCK", clubColor:"#0c1411",
    avatar:"1547425260-76bcadfb4f2c" },
  { id:3, name:"Антон Смирнов",   pos:{kind:"def",label:"ЗАЩ"}, rating:94,  club:"AST", clubColor:"#0e4a35",
    avatar:"1500648767791-00dcc994a43e" },
  { id:4, name:"Андрей Волков",   pos:{kind:"gk", label:"ВРТ"}, rating:89,  club:"SHA", clubColor:"#c46b1f",
    avatar:"1506794778202-cad84cf45f1d" },
  { id:5, name:"Даниил Кузнецов", pos:{kind:"mid",label:"ПЗЩ"}, rating:86,  club:"AST", clubColor:"#0e4a35",
    avatar:"1531123897727-8f129e1688ce" },
  { id:6, name:"Михаил Орлов",    pos:{kind:"fwd",label:"НАП"}, rating:84,  club:"FCK", clubColor:"#0c1411",
    avatar:"1502685104226-ee32379fefbe" },
  { id:7, name:"Кирилл Соколов",  pos:{kind:"def",label:"ЗАЩ"}, rating:81,  club:"DIN", clubColor:"#1f4ea0",
    avatar:"1488161628813-04466f872be2" },
  { id:8, name:"Артём Беляев",    pos:{kind:"mid",label:"ПЗЩ"}, rating:78,  club:"DIN", clubColor:"#1f4ea0",
    avatar:"1504593811423-6dd665756598" },
];

function PosTag({pos}) {
  const cls = "pos-" + pos.kind;
  const Glyph = pos.kind==="fwd"?Icon.PosFwd:pos.kind==="mid"?Icon.PosMid:pos.kind==="def"?Icon.PosDef:Icon.PosGk;
  return (
    <span className={"pos-tag "+cls}>
      <Glyph/>
      {pos.label}
    </span>
  );
}

function ratingTier(r) {
  if (r >= 90) return { c1:'#6366f1', c2:'#4338ca', text:'#4338ca', track:'#e0e0f8' };
  if (r >= 80) return { c1:'#f5b800', c2:'#d4920a', text:'#b8860b', track:'#fdf0c8' };
  if (r >= 70) return { c1:'#b0b5ba', c2:'#8a8e93', text:'#6b7280', track:'#e8eaec' };
  if (r >= 55) return { c1:'#d4783a', c2:'#a85828', text:'#8b4a20', track:'#f2e0d0' };
  return { c1:'#3f3f46', c2:'#18181b', text:'#1c1917', track:'#e4e4e7' };
}

function Ring({rating}) {
  const r = 24;
  const c = 2*Math.PI*r;
  const pct = Math.max(0, Math.min(100, rating))/100;
  const t = ratingTier(rating);
  const uid = 'g'+rating;
  return (
    <svg className="ring" viewBox="0 0 56 56">
      <defs>
        <linearGradient id={uid} x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stopColor={t.c1}/>
          <stop offset="100%" stopColor={t.c2}/>
        </linearGradient>
      </defs>
      <circle cx="28" cy="28" r={r} fill="none" stroke={t.track} strokeWidth="3.5"/>
      <circle cx="28" cy="28" r={r} fill="none"
        stroke={`url(#${uid})`} strokeWidth="3.5" strokeLinecap="round"
        strokeDasharray={`${c*pct} ${c}`}
        transform="rotate(-90 28 28)"
      />
    </svg>
  );
}

function Row({p}) {
  return (
    <div className="row">
      <div className="avatar-wrap">
        <div className="avatar" style={{backgroundImage:`url(${A(p.avatar)})`}}/>
        <div className="team-badge" style={{background:p.clubColor}}>
          {p.club.slice(0,1)}
        </div>
      </div>
      <div className="row-main">
        <div className="row-name">{p.name}</div>
        <PosTag pos={p.pos}/>
      </div>
      <div className="rating">
        <Ring rating={p.rating}/>
        <span className="num font-display" style={{color: ratingTier(p.rating).text}}>{p.rating}</span>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = React.useState("Игроки");
  const tabs = ["События","Команды","Игроки","Площадки"];
  return (
    <div className="app" data-screen-label="01 Players">
      <div className="status-spacer"/>
      <div className="header">
        <div className="header-row">
          <h1 className="font-display">ИГРОКИ</h1>
          <div className="header-actions">
            <button className="icon-btn" aria-label="Уведомления"><Icon.Bell/></button>
          </div>
        </div>
      </div>

      <div className="tabs">
        {tabs.map(t => (
          <div key={t} className={"tab " + (t===tab?"active":"")} onClick={()=>setTab(t)}>{t}</div>
        ))}
      </div>

      <div className="search-row">
        <div className="search">
          <Icon.Search/>
          <span>Имя, команда…</span>
        </div>
        <div className="chip">
          <Icon.Pin style={{color:"var(--ink-700)"}}/>
          <span>Алматы</span>
          <Icon.Chevron style={{color:"var(--ink-500)"}}/>
        </div>
        <button className="filter-btn" aria-label="Фильтры"><Icon.Filter/></button>
      </div>

      <div className="result-meta">
        <div className="count">Результаты · <b>101</b></div>
        <div className="sort-pill">
          <Icon.Sort/>
          По рейтингу
          <Icon.Chevron/>
        </div>
      </div>

      <div className="list">
        {players.map(p => <Row key={p.id} p={p}/>)}
      </div>

      <div className="tabbar">
        <div className="tabbar-item"><Icon.Home/><span>Главная</span></div>
        <div className="tabbar-item"><Icon.Team/><span>Моя команда</span></div>
        <div className="tabbar-item active"><Icon.SearchTab/><span>Поиск</span></div>
        <div className="tabbar-item"><Icon.Profile/><span>Профиль</span></div>
      </div>
      <div className="home-spacer"/>
    </div>
  );
}

function Page() {
  return (
    <div style={{minHeight:"100vh",background:"#0a0d0c",display:"grid",placeItems:"center",padding:"24px"}}>
      <IOSDevice width={390} height={844}>
        <App/>
      </IOSDevice>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Page/>);
</script>
</body>
</html>
